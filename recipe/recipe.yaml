context:
  name: fnm
  version: "1.39.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/Schniz/${{ name }}/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 224081a677a02acd9f972885e824a98fa3843f5b778b28400ad5af97752f6127

build:
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - cargo install --no-track --locked --root ${{ PREFIX }} --path .
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - fnm --version

about:
  homepage: https://fnm.vercel.app/
  summary: '🚀 Fast and simple Node.js version manager, built in Rust'
  description: |
    🌎 Cross-platform support (macOS, Windows, Linux)

    ✨ Single file, easy installation, instant startup

    🚀 Built with speed in mind

    📂 Works with .node-version and .nvmrc files
  license: GPL-3.0-or-later
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/Schniz/fnm
  documentation: https://github.com/Schniz/fnm/tree/master/docs

extra:
  recipe-maintainers:
    - eunos-1128
